# You can configure one or many cameras.
# For first tests, keep one local video or image enabled and RTSP disabled.

cameras:
  - camera_id: video_001
    name: Local Video Test Camera
    enabled: true
    source_type: video
    reader: opencv
    url: data/input/full.mp4
    location: Local Test
    sample_fps: 1.0
    resize_width: 650
    resize_height: 280
    cooldown_seconds_pet: 300
    cooldown_seconds_garbage: 900
    loop_video: false
    metadata:
      site: test_site
      area: test_area

  - camera_id: image_001
    name: Local Image Test Camera
    enabled: true
    source_type: image
    reader: opencv
    url: data/input/cctv_trash.png
    location: Local Test
    sample_fps: 1.0
    resize_width: 650
    resize_height: 280
    cooldown_seconds_pet: 300
    cooldown_seconds_garbage: 900
    loop_video: false
    metadata:
      site: test_site
      area: test_area

  - camera_id: camera_001
    name: RTSP Camera Test
    enabled: true
    source_type: rtsp
    # Use vlc when OpenCV/FFmpeg fail but VLC desktop can authenticate.
    reader: vlc
    url: rtsp://10.10.15.10:554/vod/5C0B2920-5DAB-4937-B8BC-5B729F6DD5DF
    username: test
    password: Admin_123
    location: Street Gate 1
    sample_fps: 1.0
    resize_width: 650
    resize_height: 280
    cooldown_seconds_pet: 300
    cooldown_seconds_garbage: 900
    loop_video: false
    metadata:
      site: main_site
      vendor: milestone_or_camera_vendor
